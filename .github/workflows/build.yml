name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.1)'
        required: false
        default: ''

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install AppImage tool
        run: |
          sudo apt-get update && sudo apt-get install -y appimagetool || true
          # the package may not exist; build:appimage script has fallback

      - name: Package Linux
        run: |
          # build deb, rpm and zip packages
          npm run make -- --platform=linux --targets=deb,rpm,zip --publish never

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-builds
          path: |
            out/make/**/*.AppImage
            out/make/**/*.deb
            out/make/**/*.rpm
            out/make/**/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Package Windows
        run: npm run make -- --platform=win32 --publish never

      - name: List Windows output directory
        run: ls -R out/make || true

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-builds
          path: |
            out/make/**/*.exe
            out/make/**/*.zip
            out/make/**/*.msi
            out/make/**/*.nupkg


  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux-builds/*
            artifacts/windows-builds/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
