name: CI & Release

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main'"
    name: Create version tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: getver
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT
      - name: Fetch existing tags
        run: |
          git fetch --tags
      - name: Check for existing tag
        run: |
          if git rev-parse "v${{ steps.getver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag exists, skipping";
            exit 0;
          fi
      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.getver.outputs.version }}"
          git push origin "v${{ steps.getver.outputs.version }}"

  build:
    name: Build (${{ matrix.os }})
    # run on branch pushes and tag pushes; tag job executes concurrently but is not required
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Package with Electron Forge
        run: npm run make
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deyad-${{ matrix.os }}
          path: out/make/**
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/')
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: deyad-ubuntu-latest
          path: artifacts/linux
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: deyad-macos-latest
          path: artifacts/macos
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: deyad-windows-latest
          path: artifacts/windows
      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( \
            -name '*.deb' -o -name '*.rpm' -o -name '*.zip' \
            -o -name '*.dmg' -o -name '*.exe' -o -name '*.nupkg' \
            -o -name '*.AppImage' -o -name '*.snap' \
          \) -exec cp {} release/ \;
          echo "=== Release files ==="
          ls -lh release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: false
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
